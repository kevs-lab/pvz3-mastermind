<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastermind Solver</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent2: #34d399;
    --warn: #f59e0b;
    --danger: #f87171;
    --text: #e8eaf6;
    --muted: #7b82a8;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    padding: 0 0 3rem;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--accent);
  }
  header span {
    font-size: 12px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }
  .container { max-width: 520px; margin: 0 auto; padding: 1.25rem; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .card-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  #suggestion-display {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--text);
  }
  #suggestion-note {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }
  #candidate-count {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    color: var(--accent);
  }

  .pos-block { margin-bottom: 1rem; }
  .pos-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .pos-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    background: rgba(79,142,247,0.12);
    border: 1px solid rgba(79,142,247,0.25);
    border-radius: 6px;
    padding: 3px 10px;
    min-width: 48px;
    text-align: center;
  }
  .pos-pos { font-size: 12px; color: var(--muted); }
  .clue-options {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .clue-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 13px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .clue-btn:active { opacity: 0.8; }
  .clue-btn.selected {
    border-color: var(--accent2);
    background: rgba(52,211,153,0.08);
    color: var(--text);
  }
  .clue-btn .icon { font-size: 16px; flex-shrink: 0; }
  .clue-btn .desc { line-height: 1.3; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

  .btn-row { display: flex; gap: 8px; }
  button.primary {
    flex: 1;
    padding: 12px;
    border-radius: var(--radius);
    border: 1px solid var(--accent);
    background: rgba(79,142,247,0.15);
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  button.primary:active { background: rgba(79,142,247,0.3); }
  button.secondary {
    padding: 12px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  button.secondary:active { color: var(--text); }

  #solved-banner {
    display: none;
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.4);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    color: var(--accent2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 1rem;
  }
  #error-banner {
    display: none;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    color: var(--danger);
    font-size: 13px;
    margin-bottom: 1rem;
  }

  .history-card { margin-bottom: 0.75rem; }
  .history-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    align-items: start;
  }
  .h-guess {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 2px;
  }
  .h-round { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-family: 'IBM Plex Mono', monospace; }
  .h-clues { font-size: 18px; letter-spacing: 2px; }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <h1>MASTERMIND SOLVER</h1>
  <span>4 positions · 19 combos · minimax</span>
</header>

<div class="container">

  <div id="error-banner"></div>
  <div id="solved-banner"></div>

  <div class="card">
    <div class="info-row">
      <div class="card-label" style="margin-bottom:0">Candidates remaining</div>
      <span id="candidate-count">—</span>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Suggested guess</div>
    <div id="suggestion-display">—</div>
    <div id="suggestion-note"></div>
  </div>

  <div class="card">
    <div class="card-label">Enter clues for this guess</div>
    <div id="clue-grid"></div>
  </div>

  <div class="btn-row">
    <button class="primary" onclick="submitClues()">SUBMIT CLUES</button>
    <button class="secondary" onclick="resetAll()">RESET</button>
  </div>

  <div id="history-section" style="display:none; margin-top:1.5rem;">
    <div class="card-label" style="margin-bottom:0.75rem;">Guess history</div>
    <div id="history"></div>
  </div>

</div>

<script>
const LETTERS = ['A','B','C','D','E'];
const FORBIDDEN = new Set(['AC','CA','AE','EA','CE','EC']);

const ALL_COMBOS = [];
for (let i=0;i<5;i++) for (let j=i;j<5;j++) {
  const c = LETTERS[i]+LETTERS[j];
  if (!FORBIDDEN.has(c)) ALL_COMBOS.push(c);
}

function norm(c) { return c.split('').sort().join(''); }

function getPartialClue(guessCombo, answerCombo) {
  const g = norm(guessCombo).split('');
  const a = norm(answerCombo).split('');
  if (g.join('')===a.join('')) return 0;
  let exact=0;
  for (let i=0;i<2;i++) if (g[i]===a[i]) exact++;
  if (exact===1) return 2;
  return 3;
}

function scoreGuess(guess, answer) {
  const gn = guess.map(norm);
  const an = answer.map(norm);
  const usedA = new Array(4).fill(false);
  const clues = new Array(4).fill(-1);
  for (let i=0;i<4;i++) {
    if (gn[i]===an[i]) { clues[i]=0; usedA[i]=true; }
  }
  for (let i=0;i<4;i++) {
    if (clues[i]!==-1) continue;
    let found=false;
    for (let j=0;j<4;j++) {
      if (!usedA[j] && j!==i && gn[i]===an[j]) { clues[i]=1; found=true; usedA[j]=true; break; }
    }
    if (!found) clues[i]=getPartialClue(guess[i],answer[i]);
  }
  return clues;
}

function allGuesses() {
  const res=[];
  for (let a of ALL_COMBOS) for (let b of ALL_COMBOS) for (let c of ALL_COMBOS) for (let d of ALL_COMBOS)
    res.push([a,b,c,d]);
  return res;
}

function chooseGuess(candidates, history) {
  if (candidates.length===0) return null;
  if (candidates.length===1) return candidates[0];
  if (history.length===0) return ['AB','CD','BE','DA'];
  let best=null, bestScore=Infinity;
  const pool = candidates.length<=300 ? candidates : candidates.slice(0,300);
  for (let g of pool) {
    const buckets={};
    for (let cand of candidates) {
      const key=scoreGuess(g,cand).join('');
      buckets[key]=(buckets[key]||0)+1;
    }
    const worst=Math.max(...Object.values(buckets));
    if (worst<bestScore) { bestScore=worst; best=g; }
  }
  return best;
}

const CLUE_DEFS = [
  { icon:'✅', label:'Correct combination, correct position' },
  { icon:'🔄', label:'Correct combination, wrong position' },
  { icon:'🔶', label:'One letter matches its sub-position' },
  { icon:'❌', label:'Completely wrong' }
];

let candidates=[], currentGuess=null, history=[], selectedClues=[null,null,null,null];

function init() {
  candidates=allGuesses();
  history=[];
  selectedClues=[null,null,null,null];
  currentGuess=chooseGuess(candidates,history);
  document.getElementById('candidate-count').textContent=candidates.length;
  document.getElementById('solved-banner').style.display='none';
  document.getElementById('error-banner').style.display='none';
  document.getElementById('history-section').style.display='none';
  document.getElementById('history').innerHTML='';
  renderSuggestion();
  renderClueGrid();
}

function renderSuggestion() {
  const el=document.getElementById('suggestion-display');
  const note=document.getElementById('suggestion-note');
  if (!currentGuess) { el.textContent='—'; return; }
  el.textContent=currentGuess.join('  ');
  if (candidates.length===1) note.textContent='Only one possibility left!';
  else note.textContent='Minimax optimal guess';
}

function renderClueGrid() {
  const grid=document.getElementById('clue-grid');
  grid.innerHTML='';
  if (!currentGuess) return;
  selectedClues=[null,null,null,null];
  currentGuess.forEach((combo,pos) => {
    const block=document.createElement('div');
    block.className='pos-block';
    const header=document.createElement('div');
    header.className='pos-header';
    header.innerHTML=`<span class="pos-label">${combo}</span><span class="pos-pos">Position ${pos+1}</span>`;
    block.appendChild(header);
    const opts=document.createElement('div');
    opts.className='clue-options';
    CLUE_DEFS.forEach((def,ci) => {
      const btn=document.createElement('button');
      btn.className='clue-btn';
      btn.innerHTML=`<span class="icon">${def.icon}</span><span class="desc">${def.label}</span>`;
      btn.onclick=()=>{
        selectedClues[pos]=ci;
        opts.querySelectorAll('.clue-btn').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
      };
      opts.appendChild(btn);
    });
    block.appendChild(opts);
    if (pos<3) { const hr=document.createElement('hr'); hr.className='divider'; block.appendChild(hr); }
    grid.appendChild(block);
  });
}

function submitClues() {
  const errEl=document.getElementById('error-banner');
  if (selectedClues.some(c=>c===null)) {
    errEl.style.display='block';
    errEl.textContent='Please select a clue for all 4 positions.';
    return;
  }
  errEl.style.display='none';
  if (selectedClues.every(c=>c===0)) {
    document.getElementById('solved-banner').style.display='block';
    document.getElementById('solved-banner').textContent=`SOLVED: ${currentGuess.join('  ')}`;
    document.getElementById('clue-grid').innerHTML='';
    document.getElementById('suggestion-display').textContent=currentGuess.join('  ');
    document.getElementById('suggestion-note').textContent='Puzzle complete!';
    history.push({guess:currentGuess,clues:[...selectedClues]});
    renderHistory();
    document.getElementById('history-section').style.display='block';
    return;
  }
  history.push({guess:currentGuess,clues:[...selectedClues]});
  candidates=candidates.filter(cand=>{
    const sc=scoreGuess(currentGuess,cand);
    return sc.every((v,i)=>v===selectedClues[i]);
  });
  document.getElementById('candidate-count').textContent=candidates.length;
  if (candidates.length===0) {
    errEl.style.display='block';
    errEl.textContent='No valid candidates remain — check that the clues were entered correctly.';
    renderHistory();
    document.getElementById('history-section').style.display='block';
    return;
  }
  currentGuess=chooseGuess(candidates,history);
  renderSuggestion();
  renderClueGrid();
  renderHistory();
  document.getElementById('history-section').style.display='block';
}

function renderHistory() {
  const el=document.getElementById('history');
  el.innerHTML='';
  history.forEach((h,i) => {
    const card=document.createElement('div');
    card.className='card history-card';
    const row=document.createElement('div');
    row.className='history-row';
    const left=document.createElement('div');
    left.innerHTML=`<div class="h-round">GUESS ${i+1}</div><div class="h-guess">${h.guess.join('  ')}</div>`;
    const right=document.createElement('div');
    right.innerHTML=`<div class="h-round">CLUES</div><div class="h-clues">${h.clues.map(c=>['✅','🔄','🔶','❌'][c]).join(' ')}</div>`;
    row.appendChild(left);
    row.appendChild(right);
    card.appendChild(row);
    el.appendChild(card);
  });
}

init();
</script>
</body>
</html>
